<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyHelper ✈️</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 2em auto;
      padding: 0 1em;
      color: #1a1a1a;
    }
    h1 { font-weight: 600; }
    #history {
      height: 460px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1em;
      margin-bottom: 1em;
      background: #fafafa;
    }
    .msg {
      margin: 0 0 0.8em 0;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { color: #0066cc; }
    .msg.assistant { color: #1a1a1a; }
    .msg.error { color: #c00; font-style: italic; }
    .msg.toolcall {
      color: #666;
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace;
      font-size: 0.85em;
      background: #f1f1f1;
      border-left: 3px solid #888;
      padding: 0.3em 0.6em;
      margin-left: 1em;
    }
    .msg.toolcall .tc-result { color: #1a4a1a; }
    .msg.toolcall.tc-error .tc-result { color: #aa2222; }
    .msg.guardalert {
      color: #aa2222;
      font-weight: 600;
      background: #ffe8e8;
      border-left: 3px solid #c00;
      padding: 0.3em 0.6em;
      margin-left: 1em;
      font-family: ui-monospace, monospace;
      font-size: 0.85em;
    }
    .role { font-weight: 600; margin-right: 0.4em; }
    textarea {
      width: 100%;
      box-sizing: border-box;
      height: 90px;
      padding: 0.6em;
      font-family: inherit;
      font-size: 1em;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }
    button {
      padding: 0.6em 2em;
      margin-top: 0.5em;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      background: #0066cc;
      color: white;
      cursor: pointer;
    }
    button:disabled { background: #888; cursor: not-allowed; }
    .meta { font-size: 0.85em; color: #666; margin-top: 0.5em; }
  </style>
</head>
<body>
  <h1>SkyHelper ✈️</h1>
  <div class="meta" style="margin-bottom:0.5em;display:flex;gap:0.8em;flex-wrap:wrap;align-items:center">
    <label>Bearer: <input id="bearer" type="password" placeholder="(пусто = dev)" style="font-family:ui-monospace;width:200px;padding:2px 6px"></label>
    <label>X-User-Id: <input id="userid" value="DEMO_USER" style="font-family:ui-monospace;width:140px;padding:2px 6px"></label>
    <button id="reset" type="button" style="padding:2px 10px;background:#888;font-size:0.85em">Новая сессия</button>
  </div>
  <div class="meta" style="margin-bottom:0.4em;display:flex;gap:0.8em;align-items:center">
    <span>Промпт:</span>
    <label><input type="radio" name="prompt_mode" value="naive"> Обычный</label>
    <label><input type="radio" name="prompt_mode" value="hardened" checked> Усиленный</label>
  </div>
  <div class="meta" style="margin-bottom:0.4em;display:flex;gap:0.8em;align-items:center">
    <span>Санитизация:</span>
    <label><input type="radio" name="sanitize" value="on" checked> Вкл</label>
    <label><input type="radio" name="sanitize" value="off"> Выкл</label>
  </div>
  <div class="meta" style="margin-bottom:0.4em;display:flex;gap:0.8em;align-items:center">
    <span>Валидация ответа:</span>
    <label><input type="radio" name="validate_output" value="on" checked> Вкл</label>
    <label><input type="radio" name="validate_output" value="off"> Выкл</label>
  </div>
  <div class="meta" style="margin-bottom:0.8em;display:flex;gap:0.8em;align-items:center">
    <label style="display:flex;gap:0.4em;align-items:center;cursor:pointer">
      <input type="checkbox" id="use_gateway">
      <span>Через Gateway <code style="font-size:0.8em;opacity:0.7">:8001</code></span>
    </label>
    <span id="gateway_status" style="font-size:0.8em;opacity:0.6"></span>
  </div>
  <div id="history"></div>
  <textarea id="input" placeholder="Куда летим? (Enter — отправить, Shift+Enter — перенос строки)"></textarea>
  <div>
    <button id="send">Отправить</button>
    <span class="meta">user: <code id="uid">DEMO_USER</code> · session: <code id="sid">—</code> · prompt: <code id="pmode">hardened</code> · sanitize: <code id="slabel">on</code> · validate: <code id="vlabel">on</code></span>
  </div>
  <script>
    let sessionId = null;
    const history = document.getElementById('history');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const sidLabel = document.getElementById('sid');
    const uidLabel = document.getElementById('uid');
    const pmodeLabel = document.getElementById('pmode');
    const slabel = document.getElementById('slabel');
    const userIdInput = document.getElementById('userid');
    const bearerInput = document.getElementById('bearer');
    const resetBtn = document.getElementById('reset');
    const promptModeRadios = document.querySelectorAll('input[name="prompt_mode"]');
    const sanitizeRadios = document.querySelectorAll('input[name="sanitize"]');
    const validateRadios = document.querySelectorAll('input[name="validate_output"]');
    const vlabel = document.getElementById('vlabel');
    const gatewayCheckbox = document.getElementById('use_gateway');
    const gatewayStatus = document.getElementById('gateway_status');

    // Восстановить состояние галочки из localStorage
    gatewayCheckbox.checked = localStorage.getItem('use_gateway') === 'true';
    gatewayCheckbox.addEventListener('change', () => {
      localStorage.setItem('use_gateway', gatewayCheckbox.checked);
      gatewayStatus.textContent = gatewayCheckbox.checked ? '(запросы идут через прокси)' : '';
    });
    gatewayStatus.textContent = gatewayCheckbox.checked ? '(запросы идут через прокси)' : '';

    bearerInput.value = localStorage.getItem('bearer') || '';
    bearerInput.addEventListener('input', () => {
      localStorage.setItem('bearer', bearerInput.value);
    });

    const savedMode = localStorage.getItem('prompt_mode') || 'hardened';
    for (const r of promptModeRadios) {
      r.checked = (r.value === savedMode);
      r.addEventListener('change', () => {
        if (r.checked) {
          localStorage.setItem('prompt_mode', r.value);
          pmodeLabel.textContent = r.value;
        }
      });
    }
    pmodeLabel.textContent = savedMode;

    const savedSanitize = localStorage.getItem('sanitize') || 'on';
    for (const r of sanitizeRadios) {
      r.checked = (r.value === savedSanitize);
      r.addEventListener('change', () => {
        if (r.checked) {
          localStorage.setItem('sanitize', r.value);
          slabel.textContent = r.value;
        }
      });
    }
    slabel.textContent = savedSanitize;

    const savedValidate = localStorage.getItem('validate_output') || 'on';
    for (const r of validateRadios) {
      r.checked = (r.value === savedValidate);
      r.addEventListener('change', () => {
        if (r.checked) {
          localStorage.setItem('validate_output', r.value);
          vlabel.textContent = r.value;
        }
      });
    }
    vlabel.textContent = savedValidate;

    function currentValidateOutput() {
      for (const r of validateRadios) if (r.checked) return r.value !== 'off';
      return true;
    }

    function currentPromptMode() {
      for (const r of promptModeRadios) if (r.checked) return r.value;
      return 'hardened';
    }

    function currentSanitize() {
      for (const r of sanitizeRadios) if (r.checked) return r.value !== 'off';
      return true;
    }

    function refreshUidLabelFromInput() {
      // Звёздочка означает «значение из поля, ещё не подтверждено сервером».
      uidLabel.textContent = ((userIdInput.value || 'ANON').trim()) + ' *';
      uidLabel.style.opacity = '0.6';
    }
    userIdInput.addEventListener('input', refreshUidLabelFromInput);
    refreshUidLabelFromInput();

    resetBtn.onclick = () => {
      sessionId = null;
      sidLabel.textContent = '—';
      refreshUidLabelFromInput();
      history.innerHTML = '';
      input.focus();
    };

    function append(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const r = document.createElement('span');
      r.className = 'role';
      r.textContent = role === 'user' ? 'Вы:' : (role === 'assistant' ? 'SkyHelper:' : 'ошибка:');
      div.appendChild(r);
      div.appendChild(document.createTextNode(text));
      history.appendChild(div);
      history.scrollTop = history.scrollHeight;
    }

    function summarizeResult(resultStr) {
      try {
        const r = JSON.parse(resultStr);
        if (r.error) return { text: '❌ ' + r.error, isError: true };
        if (r.valid === false) return { text: '❌ invalid: ' + (r.reason || 'unknown'), isError: true };
        if (r.valid === true) return { text: '✅ valid (discount=' + r.discount_percent + '%)', isError: false };
        if (r.success) return { text: '✅ booking_id=' + r.booking_id + ', ' + r.final_price_rub + ' ₽', isError: false };
        if (r.draft) return { text: '📋 draft: ' + r.draft.flight_id + ', ' + r.draft.final_price_rub + ' ₽', isError: false };
        if (r.flights !== undefined) return { text: r.count + ' flights found', isError: false };
        if (r.content !== undefined) return { text: '📄 ' + r.content.length + ' chars (' + (r.trust_level || 'data') + ')', isError: false };
        return { text: JSON.stringify(r).slice(0, 100), isError: false };
      } catch (e) {
        return { text: (resultStr || '').slice(0, 100), isError: false };
      }
    }

    function appendToolCall(tc) {
      const div = document.createElement('div');
      div.className = 'msg toolcall';

      let argsStr = tc.args || '';
      try { argsStr = JSON.stringify(JSON.parse(tc.args)); } catch (e) {}
      if (argsStr.length > 100) argsStr = argsStr.slice(0, 97) + '...';

      const summary = summarizeResult(tc.result);
      if (summary.isError) div.classList.add('tc-error');

      const labelSpan = document.createElement('span');
      labelSpan.className = 'role';
      labelSpan.textContent = '🔧 ' + tc.name + '(' + argsStr + ')';
      div.appendChild(labelSpan);
      div.appendChild(document.createTextNode(' → '));
      const resultSpan = document.createElement('span');
      resultSpan.className = 'tc-result';
      resultSpan.textContent = summary.text;
      div.appendChild(resultSpan);

      history.appendChild(div);
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;
      append('user', msg);
      input.value = '';
      sendBtn.disabled = true;
      try {
        const headers = {
          'Content-Type': 'application/json',
          'X-User-Id': (userIdInput.value || 'ANON').trim(),
        };
        const bearer = (bearerInput.value || '').trim();
        if (bearer) headers['Authorization'] = 'Bearer ' + bearer;
        const r = await fetch('/chat', {
          method: 'POST',
          headers,
          body: JSON.stringify({
            session_id: sessionId,
            message: msg,
            prompt_mode: currentPromptMode(),
            sanitize: currentSanitize(),
            validate_output: currentValidateOutput(),
            use_gateway: gatewayCheckbox.checked,
          }),
        });
        if (!r.ok) {
          let detail = '';
          try { detail = ': ' + ((await r.json()).detail || ''); } catch (e) {}
          append('error', 'HTTP ' + r.status + detail);
          return;
        }
        const data = await r.json();
        sessionId = data.session_id;
        sidLabel.textContent = sessionId.slice(0, 8) + '…';
        uidLabel.textContent = data.user_id;
        uidLabel.style.opacity = '1';
        if (data.prompt_mode) pmodeLabel.textContent = data.prompt_mode;
        if (data.tool_calls && data.tool_calls.length > 0) {
          for (const tc of data.tool_calls) {
            appendToolCall(tc);
          }
        }
        if (data.guard_alerts && data.guard_alerts.length > 0) {
          for (const alert of data.guard_alerts) {
            const div = document.createElement('div');
            div.className = 'msg guardalert';
            div.textContent = '🚨 guard triggered: ' + alert;
            history.appendChild(div);
          }
        }
        append('assistant', data.reply);
      } catch (e) {
        append('error', String(e));
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    input.focus();
  </script>
</body>
</html>
